# ============================================================
# DD Planner — Nginx Config
#
# RULES — DO NOT CHANGE:
#   - listen port MUST be 8080 (Cloud Run routes here)
#   - /api/ MUST proxy to 127.0.0.1:8001 (uvicorn)
#   - try_files fallback MUST stay for React Router
#   - Do NOT add a second listen 80 block
# ============================================================
server {
    listen 8080;          # Cloud Run requirement — do not change
    server_name _;

    root /app/frontend/build;
    index index.html;

    # All /api/* requests → Python backend (uvicorn on port 8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;   # uvicorn port — do not change
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;

        # Retry on upstream errors (handles brief uvicorn restart windows)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Hashed static assets (filename changes per build) → cache forever.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → React SPA (MUST stay for React Router to work)
    location / {
        try_files $uri $uri/ /index.html;
        # index.html and SPA fallback must ALWAYS revalidate so mobile/desktop
        # browsers never serve a stale index that points to a deleted JS bundle
        # hash (which causes a blank/white screen on returning devices).
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
